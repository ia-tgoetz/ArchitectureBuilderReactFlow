name: Trigger Deployment on Release

on:
  release:
    types: [published]
  workflow_dispatch: # Enables manual triggering from the Actions tab

jobs:
  ping-config-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Admin Permission
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const permission = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            
            if (permission.data.permission !== 'admin') {
              core.setFailed(`User '${context.actor}' does not have admin permissions on this repo.`);
            }

      - name: Emit Repository Dispatch Event
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CONFIG_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ia-tgoetz/IgnitionFrontendLocalLoadBalanced/dispatches \
            -d '{"event_type": "module-updated"}'
